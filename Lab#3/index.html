<!DOCTYPE html>
<html lang="uk">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Бокове меню -->
    <aside class="sidebar">
        <h1 class="logo">NotSpotify</h1>
        <nav>
            <ul>
                <li><a href="index.html">Головна</a></li>

    <!-- Основне наповнення-->
    <main class="content">
        <header class="header">
            <h2>Рекомендоване для вас</h2>
        </header>

        <section class="music-grid">
            <div class="card">
                <img src="https://vinylclub.com.ua/wp-content/uploads/2018/11/d0a65594-8144-11e8-80df-00163e233d69-1.jpg" alt="Album image tame-impala">
                <p>Tame Impala - The Less I Know The Better</p>
                <audio controls>
                    <source src="audio/The Less I Know The Better - Tame Impala.mp3" type="audio/mpeg">
                    Ваш браузер не підтримує аудіо.
                </audio>
            </div>
            <div class="card">
                <img src="https://i1.sndcdn.com/artworks-xydN87DgiRCPih7T-2ON21Q-t1080x1080.jpg" alt="Persona 3 Reload:OST">
                <p>Lotus Juice, Azumi Takahashi & ATLUS Sound Team - Color Your Night</p>
                <audio controls>
                    <source src="audio/Color Your Night - Lotus Juice.mp3" type="audio/mpeg">
                </audio>
            </div>
            <div class="card">
                <img src="https://upload.wikimedia.org/wikipedia/ru/a/a2/Paranoid_Android_Cover.jpg" alt="Radiohead`s-album">
                <p>Radiohead - Paranoid Android</p>
                <audio controls>
                    <source src="audio/Paranoid Android - Radiohead.mp3" type="audio/mpeg">
                </audio>
            </div>
            <div class="card">
                <img src="https://s.pacn.ws/1/p/1b0/ado-no-best-adobum-ados-greatest-hits-regular-edition-first-pre-846111.1.jpg?v=sq0abb&width=800&crop=1000,1000" alt="Ado best Adobum 2">
                <p> Ado - unravel</p>
                <audio controls>
                    <source src="audio/unravel - Ado.mp3" type="audio/mpeg">
                </audio>
            </div>
        </section>
    </main>

</html>
